# esphome-modular-lvgl-buttons/ui/clawdmeter/runway_tile.yaml
# OPTIONAL display tile for the on-device "Runway" verdict text_sensor produced
# by runway.yaml. The backend text_sensor (runway.yaml) is the source of truth
# and is NOT in the default grid; add this file only if you also want the verdict
# drawn as its own LVGL grid cell (stats_panel.yaml already shows it inline). It
# reads the text_sensor by id via a polling interval, so it stays fully decoupled
# from the backend package.
#
# Pair with a runway.yaml instance and pass its id as `runway_id`:
#   clawd_rw:      { file: runway.yaml,      vars: { uid: clawd_rw, rate_id: clawd_burn30_rate, resetin_id: clawd_reset_reset_in_min } }
#   clawd_rw_tile: { file: runway_tile.yaml, vars: { uid: clawd_rw_t, runway_id: clawd_rw_runway, row: 3, column: 3 } }
#
# vars:
#   uid          required  namespace prefix for the LVGL widget ids
#   runway_id    required  id of the runway.yaml verdict text_sensor to display
#   text         optional  tile label prefix; overrides the language default
#                          (t_tile_runway, e.g. "Runway")
#   row          required  grid row
#   column       required  grid column
#   row_span     optional  default 1
#   column_span  optional  default 1
#   refresh_sec  optional  label refresh cadence in seconds (default 5)
#   page_id      optional  parent page (default main_page)

# Two-step label resolution so the tile honours BOTH layers without nesting
# quoted defaults (which the substitution parser rejects): the language pack key
# t_tile_runway provides the localized default ("Runway"), and an explicit `text:`
# var from the device still wins over it. NOTE: these are global substitution
# names, so include this tile at most once per device.
substitutions:
  _rw_tile_i18n:  ${t_tile_runway | default("Hit limit?")}
  _rw_tile_label: ${text | default(_rw_tile_i18n)}

interval:
  - interval: ${refresh_sec | default(5)}s
    then:
      - lvgl.label.update:
          id: ${uid}_rw_val
          text: !lambda |-
            if (!id(${runway_id}).has_state()) return std::string("—");
            return id(${runway_id}).state;

lvgl:
  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - obj:
            id: ${uid}_rw_cell
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            bg_opa: TRANSP
            border_width: 0
            pad_all: 4
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 2
            widgets:
              - label:
                  id: ${uid}_rw_lbl
                  text_font: $text_font
                  text_color: $label_off_color
                  text: ${_rw_tile_label}
              - label:
                  id: ${uid}_rw_val
                  text_font: $text_font
                  text_color: $label_on_color
                  text: "—"
