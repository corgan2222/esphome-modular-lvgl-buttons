# esphome-modular-lvgl-buttons/ui/clawdmeter/lang/en.yaml
# English (en) locale pack for the Clawdmeter UI — the CANONICAL key reference.
#
# English is already the built-in fallback: every reference in the ui/* files is
# written as ${t_KEY | default("<english>")}, so including NO locale pack yields
# exactly these strings. This file therefore exists mainly as the authoritative
# list of keys to copy when adding a new language (e.g. lang/de.yaml) — keep the
# two in lockstep. Including it explicitly is harmless and makes intent obvious:
#
#   packages:
#     clawd_lang: !include esphome-modular-lvgl-buttons/ui/clawdmeter/lang/en.yaml
#
# Format strings keep their printf placeholders (%d %s %.1f %%) VERBATIM — only
# the words around them are translated. \xC2\xB7 is the UTF-8 middle dot; values
# are single-quoted so YAML passes the backslash escape through to the lambda.
substitutions:
  # ---- font glyph coverage ----
  # English is pure ASCII, so pin the minimal kernel set (= the fonts.yaml
  # default). This keeps the firmware byte-for-byte as small as the no-pack
  # build — zero size cost. Non-English packs raise this to GF_Latin_Core.
  glyphsets: GF_Latin_Kernel

  # ---- entity names (exposed to Home Assistant) ----
  t_name_burn5:              'Burn Rate 5m'
  t_name_burn30:             'Burn Rate 30m'
  t_name_ttl:                'Session Time To 100'
  t_name_eta:                'Session 100% At'
  t_name_session_reset_time: 'Session Reset Time'
  t_name_session_reset_in:   'Session Reset In'
  t_name_weekly_reset_time:  'Weekly Reset Time'
  t_name_weekly_reset_in:    'Weekly Reset In'
  t_name_animation:          'Animation'
  t_name_current_anim:       'Current Animation'
  t_name_usage_group:        'Usage Group'
  t_name_usage_rate:         'Usage Rate'
  t_name_usage_diag:         'Usage Diag'
  t_name_runway:             'Session Runway'
  t_name_runway_ratio:       'Session Runway Pace'

  # ---- stats panel: on-display format strings ----
  t_fmt_session_reset: 'Session %d%% - Reset in %d m - %s'
  t_fmt_session:       'Session %d%% - %s'
  t_fmt_weekly:        'Weekly %d%% - %s'
  t_fmt_extra_credits: 'Extra Usage: %d%% - %.1f Credits'
  t_fmt_extra:         'Extra Usage: %d%%'
  t_fmt_ttl_clk:       'Time till 100%% - %dm - %s'
  t_fmt_ttl:           'Time till 100%% - %s'
  t_fmt_burn:          'Burn  5m %s  \xC2\xB7  30m %s %%/h'
  t_fmt_runway:        'Hit limit? %s'

  # ---- stats panel: static placeholder labels (shown until first repaint) ----
  t_ph_session: 'Session —'
  t_ph_weekly:  'Weekly —'
  t_ph_extra:   'Extra Usage —'
  t_ph_ttl:     'Time till 100% —'
  t_ph_burn:    'Burn —'
  t_ph_runway:  'Hit limit? —'

  # ---- time_to_100 text sensor ----
  t_ttl_mins:    'in %d min'
  t_ttl_unknown: 'unknown'

  # ---- runway verdict (reset vs limit) — used by runway.yaml + stats_panel ----
  t_runway_spare:   'No \xC2\xB7 %dm to spare'
  t_runway_short:   'Yes \xC2\xB7 %dm early'
  t_runway_clear:   'No'
  t_runway_unknown: 'unknown'

  # ---- remote.yaml: single-page (non-grid) stats labels ----
  t_rmt_session:       'Current  %d%%'
  t_rmt_session_reset: 'Current  %d%%   \xC2\xB7   resets in %dh%02dm'
  t_rmt_weekly:        'Weekly  %d%%'
  t_rmt_weekly_reset:  'Weekly  %d%%   \xC2\xB7   resets in %dd%02dh'
  t_rmt_ph_session:    'Current  —'
  t_rmt_ph_weekly:     'Weekly  —'

  # ---- time_to_100_tile.yaml: optional display tile label ----
  t_tile_ttl: 'Till 100%'

  # ---- runway_tile.yaml: optional display tile label ----
  t_tile_runway: 'Hit limit?'

  # ---- modern layout (layout_modern.yaml) ----
  # Plain labels keep a single literal % ; *_fmt tokens are snprintf formats
  # (%s / %.1f kept verbatim).
  t_modern_session:      'Session'
  t_modern_min:          'min'
  t_modern_till:         'Time till 100%'
  t_modern_burn:         'Burn Rate'
  t_modern_burn5_unit:   '%/h  5 min'
  t_modern_burn30_unit:  '%/h  30 min'
  t_modern_hit:          'Will hit limit'
  t_modern_hit_note:     'runway'
  t_modern_weekly:       'Weekly'
  t_modern_extra:        'Extra'
  t_modern_reset_fmt:    'Reset %s'
  t_modern_eta_fmt:      'ETA %s'
  t_modern_credits_fmt:  '%.1f cr'

  # ---- charts page (charts_page.yaml) ----
  # Plain LVGL label strings (no printf placeholders). Leading/trailing spaces are
  # intentional padding before the colored legend dots — keep them inside the quotes.
  t_charts_title:           'Claude Usage'
  t_charts_legend_session:  ' Session usage   '
  t_charts_legend_weekly:   ' Weekly usage'
  t_charts_legend_credits:  ' Extra Usage Credits'
  t_charts_legend_limit:    ' Extra Usage Limit 20.0 credits'

  # ---- view-mode (view_mode.yaml) ----
  # t_view_mode_name / t_view_alt_seconds_name are HA entity names; the three
  # t_view_show_*/t_view_alternate are the select OPTION strings (also matched in
  # the apply_view/interval lambdas). restore_value persists the chosen option,
  # so keep these option tokens STABLE per language across versions.
  t_view_mode_name:        'View Mode'
  t_view_show_stats:       'Show Stats'
  t_view_show_graph:       'Show Graph'
  t_view_alternate:        'Alternate'
  t_view_alt_seconds_name: 'Alternate Seconds'
