# esphome-modular-lvgl-buttons/ui/clawdmeter/lang/de.yaml
# German (de) locale pack for the Clawdmeter UI.
#
# Each key overrides the inline English default baked into the ui/clawdmeter/*
# files. Include EXACTLY ONE locale pack in your device YAML, e.g.:
#
#   packages:
#     clawd_lang: !include esphome-modular-lvgl-buttons/ui/clawdmeter/lang/de.yaml
#
# and reference the entity-name keys (t_name_*) from your device's package vars
# (the display format/placeholder keys are consumed inside the ui/* files).
# Leaving the pack out = English (the inline defaults). See lang/en.yaml for the
# canonical key list to copy when adding a new language.
#
# Format strings keep their printf placeholders (%d %s %.1f %%) VERBATIM — only
# the words around them are translated. \xC2\xB7 is the UTF-8 middle dot; values
# are single-quoted so YAML passes the backslash escape through to the lambda.
substitutions:
  # ---- font glyph coverage ----
  # German needs Western-European accents (ä ö ü ß); GF_Latin_Core covers them.
  # This pack selects it automatically — no per-device glyphsets line needed.
  # NOTE: GF_Latin_Core enlarges every font size (~1 MB total) and OVERFLOWS the
  # app partition on small boards (e.g. jc4827w543, sunton-2432s028). Those need
  # a board with more app flash, or a custom narrow `glyphs:` list.
  glyphsets: GF_Latin_Core

  # ---- entity names (exposed to Home Assistant) ----
  t_name_burn5:              'Verbrauchsrate 5m'
  t_name_burn30:             'Verbrauchsrate 30m'
  t_name_ttl:                'Session Zeit bis 100%'
  t_name_eta:                'Session 100% um'
  t_name_session_reset_time: 'Session-Reset-Zeit'
  t_name_session_reset_in:   'Session-Reset in'
  t_name_weekly_reset_time:  'Woche Reset-Zeit'
  t_name_weekly_reset_in:    'Woche Reset in'
  t_name_animation:          'Animation'
  t_name_current_anim:       'Aktuelle Animation'
  t_name_usage_group:        'Nutzungsgruppe'
  t_name_usage_rate:         'Nutzungsrate'
  t_name_usage_diag:         'Nutzungs-Diagnose'
  t_name_runway:             'Session Runway'
  t_name_runway_ratio:       'Session Runway Tempo'

  # ---- stats panel: on-display format strings ----
  t_fmt_session_reset: 'Session %d%% - Reset in %d m - %s'
  t_fmt_session:       'Session %d%% - %s'
  t_fmt_weekly:        'Woche %d%% - %s'
  t_fmt_extra_credits: 'Extra-Nutzung: %d%% - %.1f Credits'
  t_fmt_extra:         'Extra-Nutzung: %d%%'
  t_fmt_ttl_clk:       'Zeit bis 100%% - %d Min - %s'
  t_fmt_ttl:           'Zeit bis 100%% - %s'
  t_fmt_burn:          'Verbrauch  5m %s  \xC2\xB7  30m %s %%/h'
  t_fmt_runway:        'Limit erreicht? %s'

  # ---- stats panel: static placeholder labels (shown until first repaint) ----
  t_ph_session: 'Session —'
  t_ph_weekly:  'Woche —'
  t_ph_extra:   'Extra-Nutzung —'
  t_ph_ttl:     'Zeit bis 100% —'
  t_ph_burn:    'Verbrauch —'
  t_ph_runway:  'Limit erreicht? —'

  # ---- time_to_100 text sensor ----
  t_ttl_mins:    'in %d Min.'
  t_ttl_unknown: 'unbekannt'

  # ---- runway verdict (reset vs limit) — used by runway.yaml + stats_panel ----
  t_runway_spare:   'Nein \xC2\xB7 %d Min Puffer'
  t_runway_short:   'Ja \xC2\xB7 %d Min früher'
  t_runway_clear:   'Nein'
  t_runway_unknown: 'unbekannt'

  # ---- remote.yaml: single-page (non-grid) stats labels ----
  t_rmt_session:       'Aktuell  %d%%'
  t_rmt_session_reset: 'Aktuell  %d%%   \xC2\xB7   Reset in %dh%02dm'
  t_rmt_weekly:        'Woche  %d%%'
  t_rmt_weekly_reset:  'Woche  %d%%   \xC2\xB7   Reset in %dd%02dh'
  t_rmt_ph_session:    'Aktuell  —'
  t_rmt_ph_weekly:     'Woche  —'

  # ---- time_to_100_tile.yaml: optional display tile label ----
  t_tile_ttl: 'Bis 100%'

  # ---- runway_tile.yaml: optional display tile label ----
  t_tile_runway: 'Limit erreicht?'

  # ---- modern layout (layout_modern.yaml) ----
  # Plain labels keep a single literal % ; *_fmt tokens are snprintf formats
  # (%s / %.1f kept verbatim).
  t_modern_session:      'Session'
  t_modern_min:          'Min'
  t_modern_till:         'Bis 100%'
  t_modern_burn:         'Burn-Rate'
  t_modern_burn5_unit:   '%/h  5 Min'
  t_modern_burn30_unit:  '%/h  30 Min'
  t_modern_hit:          'Limit-Treffer'
  t_modern_hit_note:     'Runway'
  t_modern_weekly:       'Woche'
  t_modern_extra:        'Extra'
  t_modern_reset_fmt:    'Reset %s'
  t_modern_eta_fmt:      'ETA %s'
  t_modern_credits_fmt:  '%.1f cr'

  # ---- charts page (charts_page.yaml) ----
  # Plain LVGL label strings (no printf placeholders). Leading/trailing spaces are
  # intentional padding before the colored legend dots — keep them inside the quotes.
  t_charts_title:           'Claude Nutzung'
  t_charts_legend_session:  ' Session   '
  t_charts_legend_weekly:   ' Woche'
  t_charts_legend_credits:  ' Extra Credits'
  t_charts_legend_limit:    ' Extra Limit 20.0 cr'
