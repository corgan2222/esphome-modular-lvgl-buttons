# esphome-modular-lvgl-buttons/ui/clawdmeter/lang/fr.yaml
# French (fr) locale pack for the Clawdmeter UI.
#
# Each key overrides the inline English default baked into the ui/clawdmeter/*
# files. Include EXACTLY ONE locale pack in your device YAML, e.g.:
#
#   packages:
#     clawd_lang: !include esphome-modular-lvgl-buttons/ui/clawdmeter/lang/fr.yaml
#
# Accented characters (é è à ç …) need a font glyphset that covers them; this
# pack selects GF_Latin_Core automatically (see the substitutions block below),
# so no per-device glyphsets line is needed. See lang/en.yaml for the key list.
#
# Format strings keep their printf placeholders (%d %s %.1f %%) VERBATIM — only
# the words around them are translated. \xC2\xB7 is the UTF-8 middle dot; values
# are single-quoted so YAML passes the backslash escape through to the lambda.
substitutions:
  # ---- font glyph coverage ----
  # French needs Western-European accents (é è à ç …); GF_Latin_Core covers them.
  # This pack selects it automatically — no per-device glyphsets line needed.
  # NOTE: GF_Latin_Core enlarges every font size (~1 MB total) and OVERFLOWS the
  # app partition on small boards (e.g. jc4827w543, sunton-2432s028). Those need
  # a board with more app flash, or a custom narrow `glyphs:` list.
  glyphsets: GF_Latin_Core

  # ---- entity names (exposed to Home Assistant) ----
  t_name_burn5:              'Taux conso 5m'
  t_name_burn30:             'Taux conso 30m'
  t_name_ttl:                'Session avant 100%'
  t_name_eta:                'Session 100% à'
  t_name_session_reset_time: 'Heure reset session'
  t_name_session_reset_in:   'Reset session dans'
  t_name_weekly_reset_time:  'Heure reset semaine'
  t_name_weekly_reset_in:    'Reset semaine dans'
  t_name_animation:          'Animation'
  t_name_current_anim:       'Animation actuelle'
  t_name_usage_group:        'Groupe usage'
  t_name_usage_rate:         'Taux usage'
  t_name_usage_diag:         'Diag usage'
  t_name_runway:             'Runway session'
  t_name_runway_ratio:       'Rythme Runway session'

  # ---- stats panel: on-display format strings ----
  t_fmt_session_reset: 'Session %d%% - Reset dans %d m - %s'
  t_fmt_session:       'Session %d%% - %s'
  t_fmt_weekly:        'Semaine %d%% - %s'
  t_fmt_extra_credits: 'Usage extra : %d%% - %.1f crédits'
  t_fmt_extra:         'Usage extra : %d%%'
  t_fmt_ttl_clk:       'Avant 100%% - %d min - %s'
  t_fmt_ttl:           'Avant 100%% - %s'
  t_fmt_burn:          'Conso  5m %s  \xC2\xB7  30m %s %%/h'
  t_fmt_runway:        'Atteint la limite ? %s'

  # ---- stats panel: static placeholder labels (shown until first repaint) ----
  t_ph_session: 'Session —'
  t_ph_weekly:  'Semaine —'
  t_ph_extra:   'Usage extra —'
  t_ph_ttl:     'Avant 100% —'
  t_ph_burn:    'Conso —'
  t_ph_runway:  'Atteint la limite ? —'

  # ---- time_to_100 text sensor ----
  t_ttl_mins:    'dans %d min'
  t_ttl_unknown: 'inconnu'

  # ---- runway verdict (reset vs limit) — used by runway.yaml + stats_panel ----
  t_runway_spare:   'Non \xC2\xB7 %d min de marge'
  t_runway_short:   'Oui \xC2\xB7 %d min plus tôt'
  t_runway_clear:   'Non'
  t_runway_unknown: 'inconnu'

  # ---- remote.yaml: single-page (non-grid) stats labels ----
  t_rmt_session:       'Actuel  %d%%'
  t_rmt_session_reset: 'Actuel  %d%%   \xC2\xB7   reset dans %dh%02dm'
  t_rmt_weekly:        'Semaine  %d%%'
  t_rmt_weekly_reset:  'Semaine  %d%%   \xC2\xB7   reset dans %dj%02dh'
  t_rmt_ph_session:    'Actuel  —'
  t_rmt_ph_weekly:     'Semaine  —'

  # ---- time_to_100_tile.yaml: optional display tile label ----
  t_tile_ttl: 'Avant 100%'

  # ---- runway_tile.yaml: optional display tile label ----
  t_tile_runway: 'Atteint la limite ?'

  # ---- modern layout (layout_modern.yaml) ----
  # Plain labels keep a single literal % ; *_fmt tokens are snprintf formats
  # (%s / %.1f kept verbatim).
  t_modern_session:      'Session'
  t_modern_min:          'min'
  t_modern_till:         'Avant 100%'
  t_modern_burn:         'Conso'
  t_modern_burn5_unit:   '%/h  5 min'
  t_modern_burn30_unit:  '%/h  30 min'
  t_modern_hit:          'Atteint limite'
  t_modern_hit_note:     'runway'
  t_modern_weekly:       'Semaine'
  t_modern_extra:        'Extra'
  t_modern_reset_fmt:    'Reset %s'
  t_modern_eta_fmt:      'ETA %s'
  t_modern_credits_fmt:  '%.1f cr'

  # ---- charts page (charts_page.yaml) ----
  # Plain LVGL label strings (no printf placeholders). Leading/trailing spaces are
  # intentional padding before the colored legend dots — keep them inside the quotes.
  t_charts_title:           'Utilisation Claude'
  t_charts_legend_session:  ' Session   '
  t_charts_legend_weekly:   ' Semaine'
  t_charts_legend_credits:  ' Crédits extra'
  t_charts_legend_limit:    ' Limite extra 20.0 cr'
