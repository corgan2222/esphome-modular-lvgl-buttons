# layout_modern_480x272.yaml — page-1 "Modern Dark" look, LANDSCAPE 480x272
# (Guition ESP32 JC4827W543, classic rotation 180 -> 480x272 canvas). Pixel-exact
# variant of the 800x480 landscape layout_modern_landscape.yaml — NOT responsive.
# Proportional scale from the 800-base: x/width x0.60 (480/800), y/height x0.5667
# (272/480). Fonts snap down a tier to match (72->42, 48->24, 42->24, 36->20,
# 24->14, everything else floors at the nunito_12 minimum). Same two-zone layout
# (creature + session LEFT, cards RIGHT) and the full card set is kept. The
# burn-card units stay to the RIGHT of the numbers (landscape pattern) — their x
# is nudged in slightly (78->44) so "%/h 30 min" clears the narrower 100px card.
# Reads the same backend compute IDs + own HA sensors. Selected by
# `design: modern_480x272`.
#
# Note: in this landscape layout the session_reset / session_min / "min" labels
# sit in the LEFT zone with ABSOLUTE x (not TOP_RIGHT), so they scale by the
# x-factor like any left-zone coordinate (230->138, 324->194).
#
# CREATURE PLACEMENT: identical pattern to the base — this file OWNS the creature
# root (`clawd_c_creature_root`) as a CENTER child inside the GIF frame and
# replicates the on_boot clawd_init() + the HA session-% sensor that feeds
# clawd_set_usage(). creature.yaml is NOT re-included; no original repo file is
# modified.

# --- own HA-derived percentage sensors (mirror stats_panel's pattern) ---
sensor:
  # Feeds the creature animation engine (was provided by creature.yaml).
  - platform: homeassistant
    id: clawd_c_anim_session_pct
    entity_id: ${ha_session_usage}
    internal: true
    on_value:
      then:
        - lambda: 'clawd_set_usage(x, 0, 0.0f, 0);'
  # Drive the modern hero/cards (consumed by clawd_m_refresh).
  - platform: homeassistant
    id: clawd_m_session_pct
    entity_id: ${ha_session_usage}
    internal: true
  - platform: homeassistant
    id: clawd_m_weekly_pct
    entity_id: ${ha_week_usage}
    internal: true
  - platform: homeassistant
    id: clawd_m_extra_pct
    entity_id: ${ha_extra_usage}
    internal: true
  - platform: homeassistant
    id: clawd_m_extra_credits
    entity_id: ${ha_extra_credits}
    internal: true

# --- boot the creature canvas (was provided by creature.yaml) ---
esphome:
  on_boot:
    - priority: -100   # after LVGL + display are up
      then:
        - lambda: |-
            clawd_init(id(clawd_c_creature_root), ${screen_width}, ${screen_height});

lvgl:
  pages:
    - id: !extend main_page
      bg_color: black
      bg_opa: COVER
      pad_all: 0
      widgets:
        # Full-page wrapper: fills the base 4x4 grid (cell 0,0 spanning all),
        # carries NO inner layout, so everything inside positions absolutely
        # relative to the page (x/y + TOP_RIGHT against the page edges).
        - obj:
            id: clawd_m_root
            grid_cell_row_pos: 0
            grid_cell_column_pos: 0
            grid_cell_row_span: 4
            grid_cell_column_span: 4
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            bg_color: black
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            radius: 0
            widgets:
              # ===== GIF frame (left column, top) — holds the creature =====
              - obj:
                  id: clawd_m_gif_frame
                  x: 10
                  y: 9
                  width: 242
                  height: 170
                  radius: 8
                  border_width: 2
                  border_color: slate_blue_gray
                  bg_color: black
                  bg_opa: COVER
                  pad_all: 0
                  widgets:
                    # Engine draws the creature into this box (clawd_init above).
                    - obj:
                        id: clawd_c_creature_root
                        align: CENTER
                        width: 100%
                        height: 100%
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
              # ===== Session hero (left column, under creature) =====
              - label:
                  text: ${t_modern_session | default("Session")}
                  x: 14
                  y: 190
                  text_font: nunito_12
                  text_color: white
              - label:
                  id: clawd_m_session_reset
                  text: ""
                  x: 138
                  y: 192
                  text_font: nunito_12
                  text_color: misty_blue
              - label:
                  id: clawd_m_session_num
                  text: "0"
                  x: 13
                  y: 197
                  text_font: nunito_42
                  text_color: ep_orange
              - label:
                  id: clawd_m_session_pct_sign
                  text: "%"
                  x: 60
                  y: 218
                  text_font: nunito_20
                  text_color: ep_orange
              - label:
                  id: clawd_m_session_min
                  text: "0"
                  x: 138
                  y: 209
                  text_font: nunito_24
                  text_color: white
              - label:
                  text: ${t_modern_min | default("min")}
                  x: 194
                  y: 221
                  text_font: nunito_12
                  text_color: misty_blue
              - bar:
                  id: clawd_m_session_bar
                  x: 14
                  y: 244
                  width: 235
                  height: 10
                  min_value: 0
                  max_value: 100
                  value: 0
                  radius: 5
                  bg_color: gray900
                  bg_opa: COVER
                  indicator:
                    bg_color: ep_orange
                    bg_opa: COVER
                    radius: 5
              # ===== Time-till-100% card (right column, row 1, full width) =====
              - obj:
                  id: clawd_m_card_till
                  x: 262
                  y: 9
                  width: 209
                  height: 68
                  radius: 9
                  border_width: 0
                  bg_color: slate_blue_gray
                  bg_opa: COVER
                  pad_all: 0
                  widgets:
                    - label:
                        text: ${t_modern_till | default("Time till 100%")}
                        x: 11
                        y: 9
                        text_font: nunito_12
                        text_color: amber
                    - label:
                        id: clawd_m_till_eta
                        text: ""
                        x: 11
                        y: 25
                        text_font: nunito_12
                        text_color: misty_blue
                    - label:
                        id: clawd_m_till_num
                        text: "0"
                        align: TOP_RIGHT
                        x: -42
                        y: 8
                        text_font: nunito_24
                        text_color: amber
                    - label:
                        text: ${t_modern_min | default("min")}
                        align: TOP_RIGHT
                        x: -13
                        y: 19
                        text_font: nunito_12
                        text_color: amber
                    - bar:
                        id: clawd_m_till_bar
                        x: 11
                        y: 52
                        width: 187
                        height: 7
                        min_value: 0
                        max_value: 100
                        value: 0
                        radius: 3
                        bg_color: gray900
                        bg_opa: COVER
                        indicator:
                          bg_color: amber
                          bg_opa: COVER
                          radius: 3
              # ===== Burn-rate card (right column, row 2 left) =====
              - obj:
                  id: clawd_m_card_burn
                  x: 262
                  y: 84
                  width: 100
                  height: 79
                  radius: 9
                  border_width: 0
                  bg_color: slate_blue_gray
                  bg_opa: COVER
                  pad_all: 0
                  widgets:
                    - label:
                        text: ${t_modern_burn | default("Burn Rate")}
                        x: 10
                        y: 8
                        text_font: nunito_12
                        text_color: white
                    - label:
                        id: clawd_m_burn5
                        text: "0"
                        x: 10
                        y: 23
                        text_font: nunito_14
                        text_color: white
                    - label:
                        text: ${t_modern_burn5_unit | default("%/h  5 min")}
                        x: 44
                        y: 28
                        text_font: nunito_12
                        text_color: misty_blue
                    - label:
                        id: clawd_m_burn30
                        text: "0"
                        x: 10
                        y: 48
                        text_font: nunito_14
                        text_color: white
                    - label:
                        text: ${t_modern_burn30_unit | default("%/h  30 min")}
                        x: 44
                        y: 53
                        text_font: nunito_12
                        text_color: misty_blue
              # ===== Will-hit-limit card (right column, row 2 right) =====
              - obj:
                  id: clawd_m_card_hit
                  x: 371
                  y: 84
                  width: 100
                  height: 79
                  radius: 9
                  border_width: 2
                  border_color: ep_green
                  bg_color: black
                  bg_opa: COVER
                  pad_all: 0
                  widgets:
                    # Header carries the Yes/No verdict appended at runtime
                    # ("Will hit limit - No"); detail line below shows the
                    # "Xm to spare / Xm early" part. Both default GREEN; the
                    # refresh script repaints them + the border RED only when
                    # the runway pace ratio says the limit WILL be hit (>1).
                    - label:
                        id: clawd_m_hit_label
                        text: ${t_modern_hit | default("Will hit limit")}
                        x: 10
                        y: 10
                        text_font: nunito_12
                        text_color: ep_green
                    - label:
                        id: clawd_m_hit_num
                        text: ""
                        x: 10
                        y: 29
                        text_font: nunito_12
                        text_color: ep_green
              # ===== Weekly card (right column, row 3 left) =====
              - obj:
                  id: clawd_m_card_weekly
                  x: 262
                  y: 170
                  width: 100
                  height: 84
                  radius: 9
                  border_width: 0
                  bg_color: slate_blue_gray
                  bg_opa: COVER
                  pad_all: 0
                  widgets:
                    - label:
                        text: ${t_modern_weekly | default("Weekly")}
                        x: 10
                        y: 8
                        text_font: nunito_12
                        text_color: white
                    - label:
                        id: clawd_m_weekly_reset
                        text: ""
                        align: TOP_RIGHT
                        x: -8
                        y: 8
                        text_font: nunito_12
                        text_color: misty_blue
                    - label:
                        id: clawd_m_weekly_num
                        text: "0%"
                        x: 10
                        y: 25
                        text_font: nunito_24
                        text_color: ep_green
                    - bar:
                        id: clawd_m_weekly_bar
                        x: 10
                        y: 70
                        width: 80
                        height: 6
                        min_value: 0
                        max_value: 100
                        value: 0
                        radius: 3
                        bg_color: gray900
                        bg_opa: COVER
                        indicator:
                          bg_color: ep_green
                          bg_opa: COVER
                          radius: 3
              # ===== Extra card (right column, row 3 right) =====
              # NOTE: the credits label is `clawd_m_extra_cr`, NOT
              # clawd_m_extra_credits — that id is already taken by the HA
              # credits SENSOR above (ESPHome forbids duplicate IDs). The
              # refresh script writes this label from that sensor's state.
              - obj:
                  id: clawd_m_card_extra
                  x: 371
                  y: 170
                  width: 100
                  height: 84
                  radius: 9
                  border_width: 0
                  bg_color: slate_blue_gray
                  bg_opa: COVER
                  pad_all: 0
                  widgets:
                    - label:
                        text: ${t_modern_extra | default("Extra")}
                        x: 10
                        y: 8
                        text_font: nunito_12
                        text_color: white
                    - label:
                        id: clawd_m_extra_cr
                        text: ""
                        align: TOP_RIGHT
                        x: -8
                        y: 8
                        text_font: nunito_12
                        text_color: misty_blue
                    - label:
                        id: clawd_m_extra_num
                        text: "0%"
                        x: 10
                        y: 25
                        text_font: nunito_24
                        text_color: crimson
                    - bar:
                        id: clawd_m_extra_bar
                        x: 10
                        y: 70
                        width: 80
                        height: 6
                        min_value: 0
                        max_value: 100
                        value: 0
                        radius: 3
                        bg_color: gray900
                        bg_opa: COVER
                        indicator:
                          bg_color: crimson
                          bg_opa: COVER
                          radius: 3

# --- refresh: push backend compute IDs + own HA sensors into the widgets ---
# Top-level (merges with the device config's other script:/interval: blocks).
# Every read is has_state()-guarded so pre-warmup widgets show their default.
script:
  - id: clawd_m_refresh
    then:
      - lvgl.label.update:
          id: clawd_m_session_num
          text: !lambda 'return id(clawd_m_session_pct).has_state() ? to_string((int) id(clawd_m_session_pct).state) : std::string("0");'
      # Re-anchor the "%" sign just right of the session number's MEASURED width
      # so it hugs the digits whether usage is 1, 2 or 3 digits (a fixed x would
      # gap on "8" and overlap on "100"). 13 = the number's left x; +2 px lede
      # (both x0.60 of the 800-base's 22 + 4).
      - lambda: |-
          lv_obj_t *num = id(clawd_m_session_num);
          lv_obj_update_layout(num);
          lv_obj_set_x(id(clawd_m_session_pct_sign), 13 + lv_obj_get_width(num) + 2);
      - lvgl.bar.update:
          id: clawd_m_session_bar
          value: !lambda 'return id(clawd_m_session_pct).has_state() ? (int) id(clawd_m_session_pct).state : 0;'
      - lvgl.label.update:
          id: clawd_m_session_min
          text: !lambda 'return id(clawd_reset_reset_in_min).has_state() ? to_string((int) id(clawd_reset_reset_in_min).state) : std::string("0");'
      - lvgl.label.update:
          id: clawd_m_session_reset
          text: !lambda |-
            if (!id(clawd_reset_reset_clock).has_state()) return std::string("");
            char b[28];
            snprintf(b, sizeof(b), "${t_modern_reset_fmt | default("Reset %s")}", id(clawd_reset_reset_clock).state.c_str());
            return std::string(b);
      - lvgl.label.update:
          id: clawd_m_till_num
          # clawd_ttl_time_to_100 is a text_sensor ("in 45 min" / localized / "unknown").
          # Pull the first integer run out of it — single source of truth, no formula
          # duplication, locale-robust (every t_ttl_mins variant embeds the %d digits).
          text: !lambda |-
            if (!id(clawd_ttl_time_to_100).has_state()) return std::string("0");
            const std::string &s = id(clawd_ttl_time_to_100).state;
            size_t i = 0; while (i < s.size() && (s[i] < '0' || s[i] > '9')) i++;
            size_t j = i; while (j < s.size() && s[j] >= '0' && s[j] <= '9') j++;
            return i == j ? std::string("--") : s.substr(i, j - i);
      - lvgl.bar.update:
          id: clawd_m_till_bar
          value: !lambda 'return id(clawd_m_session_pct).has_state() ? (int) id(clawd_m_session_pct).state : 0;'
      - lvgl.label.update:
          id: clawd_m_till_eta
          text: !lambda |-
            if (!id(clawd_ttl_eta_clock).has_state()) return std::string("");
            char b[28];
            snprintf(b, sizeof(b), "${t_modern_eta_fmt | default("ETA %s")}", id(clawd_ttl_eta_clock).state.c_str());
            return std::string(b);
      - lvgl.label.update:
          id: clawd_m_burn5
          text: !lambda 'return id(clawd_burn5_rate).has_state() ? to_string((int) id(clawd_burn5_rate).state) : std::string("0");'
      - lvgl.label.update:
          id: clawd_m_burn30
          text: !lambda 'return id(clawd_burn30_rate).has_state() ? to_string((int) id(clawd_burn30_rate).state) : std::string("0");'
      # COMPACT 480x272: the 100px-wide hit card can't fit the appended verdict
      # ("Will hit limit - Yes" overflows at the floored nunito_12), so the title
      # stays the STATIC "Will hit limit" (set on the widget, never updated here)
      # and the verdict word moves to the detail line below, merged with the
      # "Xm early / to spare" part: "Yes 155m early" / "No 142m to spare". The
      # red/green repaint below already carries the Yes/No signal. The wider
      # modern boards keep the appended-title form (layout_modern_landscape.yaml).
      - lvgl.label.update:
          id: clawd_m_hit_num
          text: !lambda |-
            if (!id(clawd_rw_runway).has_state()) return std::string("");
            std::string s = id(clawd_rw_runway).state;
            if (s == "${t_runway_unknown | default("unknown")}") return std::string("");
            size_t p = s.find("\xC2\xB7");
            if (p == std::string::npos) return s;
            std::string verdict = s.substr(0, p);
            while (!verdict.empty() && verdict.back() == ' ') verdict.pop_back();
            std::string detail = s.substr(p + 2);
            while (!detail.empty() && detail.front() == ' ') detail.erase(detail.begin());
            if (verdict.empty()) return detail;
            if (detail.empty()) return verdict;
            return verdict + " " + detail;
      # Color: GREEN by default, RED only when the pace ratio (T_reset/T_limit)
      # exceeds 1 — i.e. usage would hit the limit BEFORE the reset.
      - if:
          condition:
            lambda: 'return id(clawd_rw_runway_ratio).has_state() && id(clawd_rw_runway_ratio).state > 1.0f;'
          then:
            - lvgl.obj.update:
                id: clawd_m_card_hit
                border_color: crimson
            - lvgl.label.update:
                id: clawd_m_hit_label
                text_color: crimson
            - lvgl.label.update:
                id: clawd_m_hit_num
                text_color: crimson
          else:
            - lvgl.obj.update:
                id: clawd_m_card_hit
                border_color: ep_green
            - lvgl.label.update:
                id: clawd_m_hit_label
                text_color: ep_green
            - lvgl.label.update:
                id: clawd_m_hit_num
                text_color: ep_green
      - lvgl.label.update:
          id: clawd_m_weekly_num
          text: !lambda 'return id(clawd_m_weekly_pct).has_state() ? (to_string((int) id(clawd_m_weekly_pct).state) + "%") : std::string("0%");'
      - lvgl.bar.update:
          id: clawd_m_weekly_bar
          value: !lambda 'return id(clawd_m_weekly_pct).has_state() ? (int) id(clawd_m_weekly_pct).state : 0;'
      - lvgl.label.update:
          id: clawd_m_weekly_reset
          text: !lambda 'return id(clawd_wreset_reset_clock).has_state() ? id(clawd_wreset_reset_clock).state : std::string("");'
      - lvgl.label.update:
          id: clawd_m_extra_num
          text: !lambda 'return id(clawd_m_extra_pct).has_state() ? (to_string((int) id(clawd_m_extra_pct).state) + "%") : std::string("0%");'
      - lvgl.bar.update:
          id: clawd_m_extra_bar
          value: !lambda 'return id(clawd_m_extra_pct).has_state() ? (int) id(clawd_m_extra_pct).state : 0;'
      - lvgl.label.update:
          id: clawd_m_extra_cr
          text: !lambda |-
            if (!id(clawd_m_extra_credits).has_state()) return std::string("");
            char b[16];
            snprintf(b, sizeof(b), "${t_modern_credits_fmt | default("%.1f cr")}", id(clawd_m_extra_credits).state);
            return std::string(b);

interval:
  - interval: 3s
    then:
      - script.execute: clawd_m_refresh
