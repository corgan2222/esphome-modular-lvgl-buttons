# esphome-modular-lvgl-buttons/ui/clawdmeter/time_to_100_tile.yaml
# OPTIONAL display tile for the on-device "Zeit bis 100%" text_sensor produced
# by time_to_100.yaml. The backend text_sensor (time_to_100.yaml) is the source
# of truth and is NOT in the default grid; add this file only if you also want
# the value drawn as an LVGL grid cell. It reads the text_sensor by id via a
# polling interval, so it stays fully decoupled from the backend package.
#
# Pair with a time_to_100.yaml instance and pass its id as `ttl_id`:
#   clawd_ttl:      { file: time_to_100.yaml,      vars: { uid: clawd_ttl, rate_id: clawd_burn30_rate } }
#   clawd_ttl_tile: { file: time_to_100_tile.yaml, vars: { uid: clawd_ttl_t, ttl_id: clawd_ttl_time_to_100, row: 2, column: 3 } }
#
# vars:
#   uid          required  namespace prefix for the LVGL widget ids
#   ttl_id       required  id of the time_to_100.yaml text_sensor to display
#   text         optional  tile label prefix; overrides the language default
#                          (t_tile_ttl, e.g. "Till 100%" / "Bis 100%")
#   row          required  grid row
#   column       required  grid column
#   row_span     optional  default 1
#   column_span  optional  default 1
#   refresh_sec  optional  label refresh cadence in seconds (default 5)
#   page_id      optional  parent page (default main_page)

# Two-step label resolution so the tile honours BOTH layers without nesting
# quoted defaults (which the substitution parser rejects): the language pack key
# t_tile_ttl provides the localized default ("Bis 100%" in de.yaml etc.), and an
# explicit `text:` var from the device still wins over it. NOTE: these are global
# substitution names, so include this tile at most once per device.
substitutions:
  _ttl_tile_i18n:  ${t_tile_ttl | default("Till 100%")}
  _ttl_tile_label: ${text | default(_ttl_tile_i18n)}

interval:
  - interval: ${refresh_sec | default(5)}s
    then:
      - lvgl.label.update:
          id: ${uid}_ttl_val
          text: !lambda |-
            if (!id(${ttl_id}).has_state()) return std::string("—");
            return id(${ttl_id}).state;

lvgl:
  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - obj:
            id: ${uid}_ttl_cell
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            bg_opa: TRANSP
            border_width: 0
            pad_all: 4
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 2
            widgets:
              - label:
                  id: ${uid}_ttl_lbl
                  text_font: $text_font
                  text_color: $label_off_color
                  text: ${_ttl_tile_label}
              - label:
                  id: ${uid}_ttl_val
                  text_font: $text_font
                  text_color: $label_on_color
                  text: "—"
