# esphome-modular-lvgl-buttons/ui/clawdmeter/fill_time.yaml
# ON-DEVICE "how long did it take to fill the limit". Measures the wall-time of
# the most recently COMPLETED fill cycle: from a session reset (usage steps down
# to ~0) up to the moment usage first reaches `full_pct` (100% = "voll"). The
# result is re-exposed as a backend device sensor (it has a `name:`), so it
# shows up in the ESPHome dashboard / Home Assistant. No LVGL — pure backend
# entity, nothing is drawn on the display.
#
# What it answers: "the last time my session limit ran full, how many minutes
# did that take from the start of the session?" Only fully observed cycles count
# (a reset we saw, followed by a climb to full we saw). If a session is reset
# before ever reaching full, the previously measured value is kept — it always
# reflects the last period in which the limit actually filled.
#
# Pairs naturally with the session-usage % that drives usage_rate.yaml /
# time_to_100.yaml. Point `source_entity` at the same HA usage % sensor.
#
# Does NOT require engine.yaml. Pure ESPHome, no custom C++ header. RAM-only
# state (restore_value: false) — a reboot simply waits for the next full cycle.
#
# vars:
#   uid            required  namespace prefix (exposed sensor id ${uid}_minutes)
#   source_entity  optional  HA usage % sensor. Bind it from your device YAML;
#                            the default is an invalid SET_ME placeholder
#                            (sensor.SET_ME_session_usage) so a missing binding
#                            reads as "unavailable" instead of a wrong id.
#   name           optional  entity name exposed to HA (default "Session Fill Time")
#   sample_sec     optional  sampling cadence in seconds (default 30). Also the
#                            resolution of the measured duration (+/- one sample).
#   full_pct       optional  usage % that counts as "full" (default 100). Lower
#                            it (e.g. 95) if the source never quite reaches 100.
#   reset_drop     optional  downward step in usage points that counts as a
#                            session reset -> starts a new fill cycle (default 5).

globals:
  # true once we have observed a reset and are timing the climb to full.
  - id: ${uid}_f_active
    type: bool
    restore_value: false
    initial_value: 'false'
  # true once this cycle already reached full (stop updating until next reset).
  - id: ${uid}_f_done
    type: bool
    restore_value: false
    initial_value: 'false'
  # wall-time (seconds since boot) the current cycle started at.
  - id: ${uid}_f_start
    type: float
    restore_value: false
    initial_value: '0'
  # previous sample value, for session-reset (downward-step) detection.
  - id: ${uid}_f_lastv
    type: float
    restore_value: false
    initial_value: 'NAN'
  # last COMPLETED fill duration in minutes — the published value (NAN = none yet).
  - id: ${uid}_f_result
    type: float
    restore_value: false
    initial_value: 'NAN'
  # time (seconds since boot) of the last sample we successfully read, for
  # detecting observation gaps (source unavailable / reboot) — a cycle must never
  # be measured across one. NAN until the first reading.
  - id: ${uid}_f_last_t
    type: float
    restore_value: false
    initial_value: 'NAN'

sensor:
  # Raw usage % pulled from HA — internal, just the input we time.
  - platform: homeassistant
    id: ${uid}_f_src
    entity_id: ${source_entity | default("sensor.SET_ME_session_usage")}
    internal: true

  # The measured fill duration. The lambda both samples (reset/full detection)
  # and publishes the last completed result, so one template sensor owns the
  # whole pipeline.
  - platform: template
    id: ${uid}_minutes
    name: ${name | default("Session Fill Time")}
    unit_of_measurement: "min"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:timer-sand-complete
    update_interval: ${sample_sec | default(30)}s
    lambda: |-
      if (!id(${uid}_f_src).has_state() || std::isnan(id(${uid}_f_src).state)) {
        // no input yet -> keep the last published value (publish nothing new).
        return {};
      }
      const float now = (float) millis() / 1000.0f;
      const float cur = id(${uid}_f_src).state;
      const float full = ${full_pct | default(100)};

      // ---- Observation-gap guard ----------------------------------------
      // The template runs on its own interval; while the source is unavailable
      // it early-returns above WITHOUT touching state, so a reconnect leaves a
      // stale previous value. If a session reset happened entirely inside such a
      // gap we never saw the down-step, and timing a "cycle" across the gap
      // would publish a bogus, inflated duration. So when too long has elapsed
      // since the last successful read, abandon any in-flight cycle and force a
      // clean re-baseline (this round's reset test is skipped because f_lastv is
      // NAN) — only fully observed, contiguous cycles are ever measured. The
      // previously completed result is left untouched.
      if (!std::isnan(id(${uid}_f_last_t)) &&
          now - id(${uid}_f_last_t) > ${sample_sec | default(30)} * 3.0f) {
        id(${uid}_f_active) = false;
        id(${uid}_f_lastv)  = NAN;
      }
      id(${uid}_f_last_t) = now;

      // ---- Session-reset detection (start of a fill cycle) --------------
      // Usage % only ever climbs within a session; at every reset it steps
      // sharply DOWN to ~0. When the new sample drops more than `reset_drop`
      // points below the previous one, treat it as a reset: (re)start timing
      // from now and arm the cycle. Compare BEFORE storing the new value.
      if (!std::isnan(id(${uid}_f_lastv))) {
        if (cur < id(${uid}_f_lastv) - ${reset_drop | default(5)}) {
          id(${uid}_f_start) = now;
          id(${uid}_f_active) = true;
          id(${uid}_f_done) = false;
        }
      }
      id(${uid}_f_lastv) = cur;

      // ---- Full reached -> record the cycle duration once ---------------
      // Only count a cycle whose start we actually observed (f_active), and
      // only the FIRST time it crosses `full` (f_done latches it) so we measure
      // time-to-full, not how long it lingers at full.
      if (id(${uid}_f_active) && !id(${uid}_f_done) && cur >= full) {
        id(${uid}_f_result) = (now - id(${uid}_f_start)) / 60.0f;
        id(${uid}_f_done) = true;
      }

      if (std::isnan(id(${uid}_f_result))) return {};  // nothing completed yet
      return id(${uid}_f_result);
