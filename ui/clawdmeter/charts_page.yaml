# charts_page.yaml — page 2 "Charts" (mockup: clawdmeter_charts).
#
# Live-only history graphs: two stacked plot panels — usage (0..100%, weekly +
# session series) and credits (0..20 cr, extra-credits + flat limit series).
# Ring buffers start EMPTY at boot; there is NO Home-Assistant history backfill,
# so the curves grow in from the right one sample at a time.
#
# DESIGN-SPECIFIC to 480x800 portrait (absolute geometry). Declares its OWN
# design-agnostic internal HA sensors so it works under any `design:` (classic
# or modern) without depending on page-1 wiring.
#
# IMPLEMENTATION NOTE — why `line` widgets, not a `chart` widget:
#   This LVGL fork (pr#12312) has NO `chart` widget and no `lvgl.line.update`
#   action. The only runtime point-update path is
#   LvLineType::set_points(FixedVector<lv_point_precise_t>) (lvgl_esphome.h),
#   proven viable by Gate 0.3b. So each data series is a `line:` widget whose
#   points we rebuild every sample in clawd_charts_render: we map the float
#   history buffer to pixel coordinates inside the plot's content rect ourselves
#   (the line widget has no axes/grid/scaling), newest sample anchored at the
#   right edge to mimic a right-to-left scrolling chart. Axis grid lines and
#   Y labels are drawn as static decorations. Empty-at-boot (<2 samples) renders
#   nothing for that series; the limit line is set once on boot.
#
#   Plot content geometry (shared by both panels, 370x156 px):
#     usage   : origin (80, 292), value range 0..100
#     credits : origin (80, 522), value range 0..20
#   Capacity 90 samples; at chart_sample_min=8 -> 90*8min ~= 12h window.

esphome:
  min_version: 2026.6.0

color:
  - id: chart_blue
    hex: "4A78E0"
  - id: chart_grid
    hex: "272A33"

globals:
  - id: clawd_hist_session
    type: std::vector<float>
    restore_value: no
  - id: clawd_hist_weekly
    type: std::vector<float>
    restore_value: no
  - id: clawd_hist_credits
    type: std::vector<float>
    restore_value: no

sensor:
  - platform: homeassistant
    id: clawd_charts_session
    entity_id: ${ha_session_usage}
    internal: true
    # Drive the header band's live readout (event-driven, no polling interval).
    on_value:
      then:
        - lvgl.label.update:
            id: clawd_ch_hdr_session
            text: !lambda 'return to_string((int) x) + "%";'
  - platform: homeassistant
    id: clawd_charts_weekly
    entity_id: ${ha_week_usage}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: clawd_ch_hdr_weekly
            text: !lambda 'return to_string((int) x) + "%";'
  - platform: homeassistant
    id: clawd_charts_credits
    entity_id: ${ha_extra_credits}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: clawd_ch_hdr_credits
            text: !lambda |-
              char b[16];
              snprintf(b, sizeof(b), "${t_modern_credits_fmt | default("%.1f cr")}", x);
              return std::string(b);

lvgl:
  pages:
    - id: clawd_charts
      bg_color: black
      bg_opa: COVER
      pad_all: 0
      widgets:
        # ---- top header band (mirrors the page-1 GIF frame) ----
        # Filled with a live current-values summary (Session / Weekly / Extra)
        # instead of an empty bordered box. Captions reuse the modern-layout i18n
        # tokens; the three values are written event-driven by the sensors'
        # on_value handlers above. ASCII "--" placeholder until the first HA value.
        - obj:
            id: clawd_charts_gif
            x: 60
            y: 20
            width: 360
            height: 210
            radius: 14
            border_width: 2
            border_color: slate_blue_gray
            bg_color: black
            bg_opa: COVER
            pad_all: 0
            widgets:
              - label:
                  text: ${t_modern_session | default("Session")}
                  x: 18
                  y: 22
                  text_font: nunito_24
                  text_color: misty_blue
              - label:
                  id: clawd_ch_hdr_session
                  text: "--"
                  align: TOP_RIGHT
                  x: -18
                  y: 14
                  text_font: nunito_36
                  text_color: white
              - label:
                  text: ${t_modern_weekly | default("Weekly")}
                  x: 18
                  y: 90
                  text_font: nunito_24
                  text_color: misty_blue
              - label:
                  id: clawd_ch_hdr_weekly
                  text: "--"
                  align: TOP_RIGHT
                  x: -18
                  y: 82
                  text_font: nunito_36
                  text_color: white
              - label:
                  text: ${t_modern_extra | default("Extra")}
                  x: 18
                  y: 158
                  text_font: nunito_24
                  text_color: misty_blue
              - label:
                  id: clawd_ch_hdr_credits
                  text: "--"
                  align: TOP_RIGHT
                  x: -18
                  y: 150
                  text_font: nunito_36
                  text_color: white

        # ================= Chart 1: usage (0..100%) =================
        - label:
            text: ${t_charts_title | default("Claude Usage")}
            x: 20
            y: 244
            text_font: nunito_24
            text_color: white

        # horizontal grid lines @ 0 / 50 / 100 %  (content y 448 / 370 / 292)
        - obj: { x: 80, y: 292, width: 370, height: 1, bg_color: chart_grid, bg_opa: COVER, border_width: 0, pad_all: 0 }
        - obj: { x: 80, y: 370, width: 370, height: 1, bg_color: chart_grid, bg_opa: COVER, border_width: 0, pad_all: 0 }
        - obj: { x: 80, y: 448, width: 370, height: 1, bg_color: chart_grid, bg_opa: COVER, border_width: 0, pad_all: 0 }
        # Y-axis labels (right-aligned in the 0..72 gutter, centered on each line)
        - label: { text: "100", x: 44, y: 286, text_font: nunito_14, text_color: gray }
        - label: { text: "50",  x: 54, y: 364, text_font: nunito_14, text_color: gray }
        - label: { text: "0",   x: 62, y: 442, text_font: nunito_14, text_color: gray }

        # data series — points rebuilt at runtime by clawd_charts_render.
        # Single degenerate initial point => nothing drawn until data arrives.
        - line:
            id: clawd_ser_weekly
            x: 80
            y: 292
            width: 370
            height: 156
            line_width: 3
            line_color: chart_blue
            points: [{ x: 0, y: 0 }]
        - line:
            id: clawd_ser_session
            x: 80
            y: 292
            width: 370
            height: 156
            line_width: 3
            line_color: ep_green
            points: [{ x: 0, y: 0 }]

        # usage legend
        - obj:
            x: 44
            y: 474
            width: 412
            height: 22
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - obj: { width: 11, height: 11, radius: 6, bg_color: ep_green, border_width: 0 }
              - label:
                  text: ${t_charts_legend_session | default(" Session usage   ")}
                  text_font: nunito_14
                  text_color: white
              - obj: { width: 11, height: 11, radius: 6, bg_color: chart_blue, border_width: 0 }
              - label:
                  text: ${t_charts_legend_weekly | default(" Weekly usage")}
                  text_font: nunito_14
                  text_color: white

        # separator
        - obj:
            x: 24
            y: 504
            width: 432
            height: 1
            bg_color: chart_grid
            bg_opa: COVER
            border_width: 0
            pad_all: 0

        # ================= Chart 2: credits (0..20 cr) =================
        # horizontal grid lines @ 0 / 10 / 20  (content y 678 / 600 / 522)
        - obj: { x: 80, y: 522, width: 370, height: 1, bg_color: chart_grid, bg_opa: COVER, border_width: 0, pad_all: 0 }
        - obj: { x: 80, y: 600, width: 370, height: 1, bg_color: chart_grid, bg_opa: COVER, border_width: 0, pad_all: 0 }
        - obj: { x: 80, y: 678, width: 370, height: 1, bg_color: chart_grid, bg_opa: COVER, border_width: 0, pad_all: 0 }
        - label: { text: "20", x: 54, y: 516, text_font: nunito_14, text_color: gray }
        - label: { text: "10", x: 54, y: 594, text_font: nunito_14, text_color: gray }
        - label: { text: "0",  x: 62, y: 672, text_font: nunito_14, text_color: gray }

        - line:
            id: clawd_ser_limit
            x: 80
            y: 522
            width: 370
            height: 156
            line_width: 3
            line_color: amber
            # STATIC flat limit at value 20 == full scale == y 0 (top of plot).
            # The limit never changes, so two endpoints in YAML suffice — no
            # runtime update, visible immediately at boot.
            points: [{ x: 0, y: 0 }, { x: 370, y: 0 }]
        - line:
            id: clawd_ser_credits
            x: 80
            y: 522
            width: 370
            height: 156
            line_width: 3
            line_color: chart_blue
            points: [{ x: 0, y: 0 }]

        # credits legend (two rows)
        - obj:
            x: 44
            y: 704
            width: 412
            height: 44
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - obj:
                  width: 412
                  height: 20
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: FLEX, flex_flow: ROW, flex_align_main: CENTER, flex_align_cross: CENTER }
                  widgets:
                    - obj: { width: 11, height: 11, radius: 6, bg_color: chart_blue, border_width: 0 }
                    - label:
                        text: ${t_charts_legend_credits | default(" Extra Usage Credits")}
                        text_font: nunito_14
                        text_color: white
              - obj:
                  width: 412
                  height: 20
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout: { type: FLEX, flex_flow: ROW, flex_align_main: CENTER, flex_align_cross: CENTER }
                  widgets:
                    - obj: { width: 11, height: 11, radius: 6, bg_color: amber, border_width: 0 }
                    - label:
                        text: ${t_charts_legend_limit | default(" Extra Usage Limit 20.0 credits")}
                        text_font: nunito_14
                        text_color: white

# ---- runtime series rendering ---------------------------------------------
# Rebuild each dynamic series' point list from its history ring buffer and push
# it into the line widget via LvLineType::set_points (Gate 0.3b). Newest sample
# anchored at the right edge with a fixed per-sample spacing (W/(CAP-1)) so the
# curve grows in leftward from the right as history fills — mimicking a scrolling
# chart. <2 samples => a single point (nothing drawn). The amber limit line is
# static (defined in YAML) and is intentionally NOT touched here.
#
# Generic lambda (`auto *ln`) sidesteps having to name the LVGL widget type; the
# point members are float-capable, so build with `p.x=`/`p.y=` assignment (NOT
# brace-init, which triggers a narrowing-conversion error).
script:
  - id: clawd_charts_render
    then:
      - lambda: |-
          auto render_line = [](auto *ln, std::vector<float> &buf, float vmax) {
            const float W = 370.0f, H = 156.0f, CAP = 90.0f;
            size_t n = buf.size();
            esphome::FixedVector<lv_point_precise_t> fv;
            if (n < 2) {
              fv.init(1);
              lv_point_precise_t p; p.x = 0.0f; p.y = H; fv.push_back(p);
              ln->set_points(std::move(fv));
              return;
            }
            fv.init(n);
            float dx = W / (CAP - 1.0f);
            for (size_t i = 0; i < n; i++) {
              float v = buf[i];
              if (v < 0.0f) v = 0.0f;
              if (v > vmax) v = vmax;
              lv_point_precise_t p;
              p.x = W - (float)(n - 1 - i) * dx;
              p.y = (1.0f - v / vmax) * H;
              fv.push_back(p);
            }
            ln->set_points(std::move(fv));
          };
          render_line(id(clawd_ser_session), id(clawd_hist_session), 100.0f);
          render_line(id(clawd_ser_weekly),  id(clawd_hist_weekly),  100.0f);
          render_line(id(clawd_ser_credits), id(clawd_hist_credits), 20.0f);

# ---- sampler --------------------------------------------------------------
# Every chart_sample_min minutes (default 8), append the current source value to
# each ring buffer (capped at 90 == ~12h window @ 8min), then re-render. Guarded
# by has_state() so HA-unavailable sources don't push garbage. There is no HA
# history backfill — the buffers start empty and fill one sample at a time.
interval:
  - interval: ${chart_sample_min | default("8")}min
    then:
      - lambda: |-
          if (id(clawd_charts_session).has_state()) {
            id(clawd_hist_session).push_back(id(clawd_charts_session).state);
            while (id(clawd_hist_session).size() > 90) id(clawd_hist_session).erase(id(clawd_hist_session).begin());
          }
          if (id(clawd_charts_weekly).has_state()) {
            id(clawd_hist_weekly).push_back(id(clawd_charts_weekly).state);
            while (id(clawd_hist_weekly).size() > 90) id(clawd_hist_weekly).erase(id(clawd_hist_weekly).begin());
          }
          if (id(clawd_charts_credits).has_state()) {
            id(clawd_hist_credits).push_back(id(clawd_charts_credits).state);
            while (id(clawd_hist_credits).size() > 90) id(clawd_hist_credits).erase(id(clawd_hist_credits).begin());
          }
      - script.execute: clawd_charts_render
