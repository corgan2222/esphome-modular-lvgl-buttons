---
# Popup system — shared scrim + bundled popup widgets
#
# Architecture
# ------------
# All popups live in LVGL's `top_layer` (a singleton container that floats
# above every page). Each popup is a sibling `obj` widget inside `top_layer`,
# hidden by default, shown on demand.
#
# A single dim scrim (`popup_scrim`) also lives in top_layer:
#   - Provides the dim backdrop behind the active popup
#   - Catches any tap outside the popup (the popup is 95% size, scrim is 100%)
#     and closes everything
#
# Each popup extends the `popup_close` script to register its own hide:
#
#   script:
#     - id: !extend popup_close
#       then:
#         - lvgl.widget.hide: popup_<name>
#
# To open a popup from anywhere:
#
#   - lvgl.widget.show: popup_scrim
#   - lvgl.widget.show: popup_<name>
#
# Z-order note: widgets render in include order within this file. The scrim
# is listed first so it renders below all popups.
#
# ---------------------------------------------------------------------------
# Bundled popups in this file:
#   - popup_color : Color picker (HSV + Kelvin modes)
# ---------------------------------------------------------------------------

globals:
  # Color picker: false = HSV mode, true = Kelvin (color-temperature) mode
  - id: color_mode_kelvin
    type: bool
    restore_value: false
    initial_value: 'false'

image:
  rgb565:
    alpha_channel:
      - file: 'esphome-modular-lvgl-buttons/assets/images/hue_ring.svg'
        id: hue_ring_img
        # ESPHome rasterizes the SVG via resvg_py at compile time to this size.
        # Bump both numbers (and the matching arc widths below) to render
        # at higher resolution.
        resize: 300x300
      - file: 'esphome-modular-lvgl-buttons/assets/images/kelvin_ring.svg'
        id: kelvin_ring_img
        resize: 300x300

script:
  # Extended by each popup below to hide its own widget.
  - id: popup_close
    then:
      - lvgl.widget.hide: popup_scrim

  # ---- Color picker popup ----

  - id: !extend popup_close
    then:
      - lvgl.widget.hide: popup_color

  # Recompute swatch + readout from whichever arc is active
  - id: color_picker_update
    then:
      - lambda: |-
          if (id(color_mode_kelvin)) {
            uint16_t k = (uint16_t) lv_arc_get_value(id(color_kelvin_arc));
            // Tanner Helland kelvin -> RGB approximation
            float t = k / 100.0f;
            float r, g, b;
            if (t <= 66.0f) {
              r = 255.0f;
              g = 99.4708025861f * logf(t) - 161.1195681661f;
              b = (t <= 19.0f)
                    ? 0.0f
                    : 138.5177312231f * logf(t - 10.0f) - 305.0447927307f;
            } else {
              r = 329.698727446f * powf(t - 60.0f, -0.1332047592f);
              g = 288.1221695283f * powf(t - 60.0f, -0.0755148492f);
              b = 255.0f;
            }
            auto cl = [](float v) -> uint8_t {
              return (uint8_t)(v < 0 ? 0 : (v > 255 ? 255 : v));
            };
            lv_color_t c = lv_color_make(cl(r), cl(g), cl(b));
            lv_obj_set_style_bg_color(id(color_swatch), c, LV_PART_MAIN);
            char buf[32];
            snprintf(buf, sizeof(buf), "%uK", k);
            lv_label_set_text(id(color_hsv_label), buf);
          } else {
            uint16_t h = (uint16_t) lv_arc_get_value(id(color_hue_arc));
            uint8_t  s = (uint8_t)  lv_arc_get_value(id(color_sat_arc));
            lv_color_t c = lv_color_hsv_to_rgb(h, s, 100);
            lv_obj_set_style_bg_color(id(color_swatch), c, LV_PART_MAIN);
            char buf[32];
            snprintf(buf, sizeof(buf), "H:%u  S:%u", h, s);
            lv_label_set_text(id(color_hsv_label), buf);
          }

  # Flip mode + show/hide the right set of widgets, then refresh swatch.
  - id: color_mode_toggle
    then:
      - lambda: 'id(color_mode_kelvin) = !id(color_mode_kelvin);'
      - if:
          condition:
            lambda: 'return id(color_mode_kelvin);'
          then:
            - lvgl.widget.hide: color_hue_ring_image
            - lvgl.widget.hide: color_hue_arc
            - lvgl.widget.hide: color_sat_arc
            - lvgl.widget.show: color_kelvin_ring_image
            - lvgl.widget.show: color_kelvin_arc
            - lvgl.label.update:
                id: color_mode_toggle_label
                text: "HSV"
          else:
            - lvgl.widget.show: color_hue_ring_image
            - lvgl.widget.show: color_hue_arc
            - lvgl.widget.show: color_sat_arc
            - lvgl.widget.hide: color_kelvin_ring_image
            - lvgl.widget.hide: color_kelvin_arc
            - lvgl.label.update:
                id: color_mode_toggle_label
                text: "K"
      - script.execute: color_picker_update

lvgl:
  top_layer:
    widgets:
      # Scrim MUST be first so all popups render above it.
      - obj:
          id: popup_scrim
          hidden: true
          width: 100%
          height: 100%
          bg_color: black
          bg_opa: 60%
          border_width: 0
          radius: 0
          pad_all: 0
          clickable: true
          on_click:
            - script.execute: popup_close

      # ---- Color picker popup ----
      - obj:
          id: popup_color
          hidden: true
          align: CENTER
          width: 95%
          height: 95%
          radius: 12
          bg_color: $bg_color
          bg_opa: COVER
          border_width: 2
          border_color: ep_orange
          pad_all: 12
          clickable: true
          widgets:
            - label:
                align: top_left
                x: 4
                y: 4
                text_font: nunito_20
                text_color: ep_orange
                text: "Color Picker"

            # Mode toggle (bottom-left). Label shows what you'd switch TO.
            - button:
                align: bottom_left
                x: 4
                y: -10
                radius: 12
                width: 60
                height: 36
                widgets:
                  - label:
                      id: color_mode_toggle_label
                      align: center
                      text_color: white
                      text: "K"
                on_short_click:
                  - script.execute: color_mode_toggle

            # ---- HSV mode widgets ----

            # Rainbow hue ring — purely visual (no input)
            - image:
                id: color_hue_ring_image
                src: hue_ring_img
                align: center
                y: -10

            # Transparent draggable arc overlaid on the hue ring.
            - arc:
                id: color_hue_arc
                align: center
                y: -10
                width: 380
                height: 380
                adjustable: true
                adv_hittest: true
                min_value: 0
                max_value: 360
                value: 0
                start_angle: 0
                end_angle: 360
                rotation: 270
                arc_width: 46
                arc_opa: transp
                indicator:
                  arc_opa: transp
                knob:
                  pad_all: 4
                  bg_opa: transp
                  border_width: 4
                  border_color: white
                  shadow_opa: transp
                on_value:
                  - script.execute: color_picker_update

            # Inner saturation arc (HSV only)
            - arc:
                id: color_sat_arc
                align: center
                y: -10
                width: 240
                height: 240
                adjustable: true
                adv_hittest: true
                min_value: 0
                max_value: 100
                value: 100
                start_angle: 0
                end_angle: 360
                rotation: 270
                arc_width: 18
                arc_color: very_dark_gray
                indicator:
                  arc_width: 18
                  arc_color: steel_blue
                knob:
                  bg_color: white
                  border_width: 2
                  border_color: steel_blue
                on_value:
                  - script.execute: color_picker_update

            # ---- Kelvin mode widgets (hidden by default) ----

            - image:
                id: color_kelvin_ring_image
                hidden: true
                src: kelvin_ring_img
                align: center
                y: -10

            - arc:
                id: color_kelvin_arc
                hidden: true
                align: center
                y: -10
                width: 380
                height: 380
                adjustable: true
                adv_hittest: true
                min_value: 1000
                max_value: 8000
                value: 4000
                start_angle: 0
                end_angle: 360
                rotation: 270
                arc_width: 46
                arc_opa: transp
                indicator:
                  arc_opa: transp
                knob:
                  pad_all: 4
                  bg_opa: transp
                  border_width: 4
                  border_color: white
                  shadow_opa: transp
                on_value:
                  - script.execute: color_picker_update

            # ---- Shared center / footer ----

            - obj:
                id: color_swatch
                align: center
                y: -10
                width: 110
                height: 110
                radius: 55
                border_width: 2
                border_color: white
                bg_color: 0xFF0000
                bg_opa: COVER

            - label:
                id: color_hsv_label
                align: top_right
                x: -4
                y: 4
                text_font: nunito_20
                text_color: white
                text: "H:0  S:100"

            - button:
                align: bottom_right
                radius: 15
                width: 100
                height: 50
                widgets:
                  - label:
                      text_color: white
                      align: center
                      text: "Close"
                on_short_click:
                  - script.execute: popup_close
