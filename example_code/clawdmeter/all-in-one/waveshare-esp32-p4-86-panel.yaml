# esphome-modular-lvgl-buttons/example_code/clawdmeter/waveshare-esp32-p4-86-panel-clawdmeter.yaml
# Clawdmeter token-usage display — Waveshare ESP32-P4 86-Panel (720x720, rotation 0).
# The clawdmeter UI is resolution-agnostic: it measures the creature region at
# boot and fits a square pixel-art canvas, so the same include works on every
# supported display. See ui/clawdmeter/README.md.
substitutions:
  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

esphome:
  name: "clawdmeter-86-panel"
  friendly_name: "Clawdmeter 86 Panel"
  comment: "Clawdmeter token-usage display on Waveshare ESP32-P4 86-Panel (720x720)"

logger:
  level: debug
  logs:
    lvgl: info
  hardware_uart: UART0

script:
  - id: time_update
    then:
      - lambda: '// no-op'

packages:
  wifi:    !include esphome-modular-lvgl-buttons/common/wifi.yaml
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  sensors: !include esphome-modular-lvgl-buttons/common/sensors_base.yaml
  theme:   !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml
  hardware: !include
    file: esphome-modular-lvgl-buttons/hardware/waveshare-esp32-p4-86-panel.yaml
    vars:
      rotation: "0"
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  # ---- Language pack ----
  # Compile-time locale: provides every t_* substitution the clawdmeter UI uses.
  # Swap to lang/de.yaml, lang/fr.yaml or lang/es.yaml (or omit entirely, English
  # is the built-in default) for another language. Exactly ONE pack.
  clawd_lang: !include esphome-modular-lvgl-buttons/ui/clawdmeter/lang/en.yaml

  clawdmeter: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/remote.yaml
    vars:
      uid: clawd
      # Square panel: split the layout over two pages so neither the creature
      # nor the stats are cramped. Page 1 = creature (full screen), page 2 =
      # stats, reachable by swiping right (see swipe_navigation below).
      stats_page_id: stats_page
      clawd_margin_top: "4%"
      clawd_creature_h: "92%"
      clawd_stats_h: "92%"
      clawd_stats_align: CENTER

lvgl:
  pages:
    - id: main_page
      styles: page_style
      bg_color: $bg_color
      widgets: []
      <<: !include esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
    - id: stats_page
      styles: page_style
      bg_color: $bg_color
      widgets: []
      <<: !include esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
