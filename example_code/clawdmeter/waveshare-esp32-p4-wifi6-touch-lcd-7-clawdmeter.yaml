# esphome-modular-lvgl-buttons/example_code/clawdmeter/waveshare-esp32-p4-wifi6-touch-lcd-7-clawdmeter.yaml
# Clawdmeter token-usage display — Waveshare ESP32-P4 WiFi6 Touch LCD 7" (1024x600, rotation 0).
# The clawdmeter UI is resolution-agnostic: it measures the creature region at
# boot and fits a square pixel-art canvas, so the same include works on every
# supported display. See ui/clawdmeter/README.md.
substitutions:
  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

esphome:
  name: "clawdmeter-p4-lcd7"
  friendly_name: "Clawdmeter P4 LCD7"
  comment: "Clawdmeter token-usage display on Waveshare ESP32-P4 WiFi6 Touch LCD 7 (1024x600)"

logger:
  level: debug
  logs:
    lvgl: info
  hardware_uart: UART0

script:
  - id: time_update
    then:
      - lambda: '// no-op'

packages:
  wifi:    !include esphome-modular-lvgl-buttons/common/wifi.yaml
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  sensors: !include esphome-modular-lvgl-buttons/common/sensors_base.yaml
  theme:   !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml
  hardware: !include
    file: esphome-modular-lvgl-buttons/hardware/waveshare-esp32-p4-wifi6-touch-lcd-7.yaml
    vars:
      rotation: "0"
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  clawdmeter: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/remote.yaml
    vars:
      uid: clawd

lvgl:
  pages:
    - id: main_page
      styles: page_style
      bg_color: $bg_color
      widgets: []
