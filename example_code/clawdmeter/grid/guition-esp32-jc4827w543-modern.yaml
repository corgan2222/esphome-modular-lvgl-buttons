# esphome-modular-lvgl-buttons/example_code/clawdmeter/grid/guition-esp32-jc4827w543-modern.yaml
#
# MODERN page-1 design (dark card layout) on Guition ESP32 JC4827W543,
# 480x272 landscape. Sibling of the classic grid config
# guition-esp32-jc4827w543.yaml (same board, creature + stats panel) —
# identical Clawdmeter backend, but page 1 is the modern card layout instead.
#
# The page-1 widgets are NOT listed here: the compile-time `design:` switch
# (substitutions, below) pulls them from ui/clawdmeter/layout_${design}.yaml
# (here: layout_modern_480x272.yaml), which owns its own creature root, the
# clawd_init on_boot and its clawd_m_* hero/card sensors. Everything else — burn
# rate (5m/30m), time-to-100%, reset clocks, runway, charts, view-mode and the
# animation picker — is computed on the ESP from the raw HA inputs and exposed as
# backend device entities, exactly like the other grid configs.
#
# To adapt to your own Home Assistant: edit ONLY the ha_* block in substitutions
# below. Never edit anything under ui/.
#
# Target: Guition ESP32 JC4827W543 (480x272 landscape panel, rotation 180 to
# match the classic config). If the image is upside down for how your panel is
# mounted, set rotation "0".

substitutions:
  # ======================================================================
  #  HOME ASSISTANT DATA SOURCE — edit ONLY this block to adapt to your HA.
  # ----------------------------------------------------------------------
  #  These are the raw Home Assistant entities the Clawdmeter reads. They
  #  are the ONLY thing you need to change for your own setup — every
  #  ui/clawdmeter/* file receives them from here via `vars:`, so you never
  #  have to (and should never) edit anything under ui/. Replace the entity
  #  ids below with the ones from your own "Claude Usage" device.
  # ======================================================================
  # ---- ha-clawdmeter integration: ONE HA device per Claude account --------
  #  All entities of that device share the same slug ${ha_account}. Set it ONCE
  #  here and every binding below follows; to track a different account you
  #  normally change ONLY this line. ha_account = the entity_id stem WITHOUT the
  #  "sensor." domain and WITHOUT the per-entity suffix. Real format:
  #  claude_<name>_<plan>  (e.g. claude_jane_pro, claude_stefan_max). Find yours
  #  in HA -> Developer Tools -> States: filter "sensor.claude", take the common
  #  prefix before "_session_usage". Entity_ids derive from each sensor's NAME,
  #  so a few suffixes are NOT obvious: "Weekly usage" -> weekly_usage, "Extra
  #  usage credits" -> extra_usage_credits, resets are session_reset / weekly_reset
  #  (no _time). Override a single line below only if HA deduped that entity (_2).
  ha_account: "claude_yourname_yourplan"   # <<< PLACEHOLDER - replace before flashing

  ha_session_usage: "sensor.${ha_account}_session_usage"        # session limit used, %
  ha_week_usage:    "sensor.${ha_account}_weekly_usage"         # weekly limit used, %
  ha_extra_usage:   "sensor.${ha_account}_extra_usage"          # extra usage, % (may be disabled in HA)
  ha_extra_credits: "sensor.${ha_account}_extra_usage_credits"  # extra usage, credits
  ha_session_reset: "sensor.${ha_account}_session_reset"        # session reset, timestamp
  ha_weekly_reset:  "sensor.${ha_account}_weekly_reset"         # weekly reset, timestamp

  # ---- Page-1 design (compile-time): classic = creature + stats panel,
  #      modern* = dark card layout. Selects ui/clawdmeter/layout_${design}.yaml.
  design: modern_480x272   # classic | modern | modern_landscape | modern_square | modern_720 | modern_1280 | modern_720x1280 | modern_320x480 | modern_480x272 | modern_320x240

  # ---- Charts page sampler cadence (minutes). The clawd_charts page snapshots
  #      the HA usage/credits values into its history ring every N minutes
  #      (90-sample cap ~= 12h at the default). Lower = denser graph, faster fill.
  chart_sample_min: "8"

  # ---- Font bit-depth (anti-aliasing levels baked into flash). Default "8"
  #      (256 AA levels) pushes the firmware past the 1.75 MB app-partition
  #      limit on this 4 MB-flash board; "4" (16 AA levels) halves every Nunito
  #      glyph bitmap — visually near-identical on the cards — and brings the
  #      image back under the OTA size limit. P4/S3-large boards leave this at 8.
  font_bpp: "4"

  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

esphome:
  name: "clawdmeter-jc4827-modern"
  friendly_name: "Clawdmeter JC4827 Modern"
  comment: "Clawdmeter modern card layout on Guition ESP32 JC4827W543 (480x272 landscape)"

logger:
  level: debug
  logs:
    lvgl: info
  hardware_uart: UART0

image:
  defaults:
    byte_order: little_endian

script:
  - id: time_update
    then:
      - lambda: '// no-op'

packages:
  wifi:    !include esphome-modular-lvgl-buttons/common/wifi.yaml
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  sensors: !include esphome-modular-lvgl-buttons/common/sensors_base.yaml
  theme:   !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml
  hardware: !include
    file: esphome-modular-lvgl-buttons/hardware/guition-esp32-jc4827w543.yaml
    vars:
      rotation: "180"
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  # ---- Language pack ----
  # Compile-time locale: provides every t_* substitution the ui/clawdmeter/* files
  # and the name overrides below reference. Swap to lang/de.yaml, lang/fr.yaml or
  # lang/es.yaml (or omit entirely, English is the built-in default) for another
  # language. Exactly ONE pack.
  clawd_lang: !include esphome-modular-lvgl-buttons/ui/clawdmeter/lang/en.yaml

  # ---- Clawdmeter, assembled from individual tiles ----
  # Shared engine — include ONCE. Pulls in the animation engine + sprite data and
  # runs the frame driver; every clawd_* function becomes available afterwards.
  clawd_engine: !include esphome-modular-lvgl-buttons/ui/clawdmeter/engine.yaml

  # Page-1 layout (compile-time switch via `design:`) — `classic` pulls in the
  # creature + stats panel; `modern*` the dark card layout. The creature/card
  # package vars live inside ui/clawdmeter/layout_${design}.yaml.
  clawd_layout: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/layout_${design}.yaml

  # Phase 2 (render-only): burn rates, time-to-100%/ETA and the runway verdict are
  # NO LONGER computed on the ESP - the ha-clawdmeter integration supplies them
  # precomputed. This include mirrors those integration entities back onto the exact
  # ids the modern layout reads (clawd_burn5_rate, clawd_burn30_rate,
  # clawd_ttl_time_to_100, clawd_ttl_eta_clock, clawd_rw_runway, clawd_rw_runway_ratio)
  # + clawd_pf_band for the pace frame, so layout_modern.yaml / pace_frame.yaml stay
  # untouched. Replaces the old clawd_burn5 / clawd_burn30 / clawd_ttl / clawd_rw includes.
  clawd_render: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/render_from_integration.yaml
    vars:
      ha_account: ${ha_account}

  # Absolute SESSION-reset wall-clock time ("HH:MM") + "reset in xx m", derived
  # on the ESP from the raw reset-time timestamp and the device timezone.
  clawd_reset: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/session_reset_clock.yaml
    vars:
      uid: clawd_reset
      source_entity: $ha_session_reset
      name: ${t_name_session_reset_time | default("Session Reset Time")}
      reset_in_name: ${t_name_session_reset_in | default("Session Reset In")}

  # Absolute WEEKLY-reset wall-clock time ("HH:MM"), same compute, fed from the
  # weekly reset-time timestamp. The "reset in" sensor it also emits is unused.
  clawd_wreset: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/session_reset_clock.yaml
    vars:
      uid: clawd_wreset
      source_entity: $ha_weekly_reset
      name: ${t_name_weekly_reset_time | default("Weekly Reset Time")}
      reset_in_name: ${t_name_weekly_reset_in | default("Weekly Reset In")}

  # (Phase 2) Runway verdict + pace ratio now come from the integration via clawd_render above (clawd_rw_runway / clawd_rw_runway_ratio).

  # Pace frame (Option A, OPTIONAL) — colours a thin border on the creature's
  # OUTER TILE from the runway pace ratio (clawd_rw_runway_ratio): no value -> no
  # border, < 0.90 green, < 1.00 orange, >= 1.00 red. Pure YAML (no engine change);
  # frames the creature's outer tile. Mute in place via enabled "false".
  #
  # show_from = lowest band that draws at all: "green" (default, all bands) |
  # "orange" (hide the calm green frame, warn from orange up) | "red" (only at/
  # over the limit). Orange/red additionally BREATHE (opacity pulse). The
  # HA-exposed switch "Pace Frame" (clawd_pf_pace_breathe_sw) is a whole-frame
  # visibility master: ON shows the frame (orange/red breathe, green solid),
  # OFF hides it entirely. Toggle it live from HA without a reflash.
  clawd_pace_frame: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/pace_frame.yaml
    vars:
      uid: clawd_pf
      ratio_id: clawd_pf_band
      green_max: "0.5"
      orange_max: "1.5"
      target_id: clawd_c_creature_root
      enabled: "true"
      width: "3"
      show_from: "orange"   # "green" = show all bands | "orange" = warn from orange up | "red" = only over-limit

  # Charts page (page 2) — design-agnostic usage/credits history graphs. Owns its
  # own HA sensors + history globals + render script + sampler; reads the top-level
  # ha_* + chart_sample_min substitutions. Always present; View-Mode cycles to it.
  clawd_charts: !include esphome-modular-lvgl-buttons/ui/clawdmeter/charts_page.yaml

  # View-Mode — runtime page cycling between the stats page (page 1) and the
  # charts page. Exposes a HA select (Show Stats / Show Graph / auto-alternate)
  # plus an "alternate seconds" number. GUARDED: only include this when
  # clawd_charts above is present (it needs a 2nd page to cycle to). The t_view_*
  # entity-name/option strings come from the active lang pack (top-level subs).
  clawd_view_mode: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/view_mode.yaml
    vars:
      uid: clawd_view
      stats_page_id: main_page
      charts_page_id: clawd_charts
      alt_seconds_default: "10"

  # Animation picker — HA select + current-clip text sensor. BACKEND ONLY: it
  # exposes the picker as device entities and draws nothing on the display.
  clawd_anim: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/anim_select.yaml
    vars:
      uid: clawd_anim
      select_name: ${t_name_animation | default("Animation")}
      current_name: ${t_name_current_anim | default("Current Animation")}
      group_name: ${t_name_usage_group | default("Usage Group")}
      rate_name: ${t_name_usage_rate | default("Usage Rate")}
      diag_name: ${t_name_usage_diag | default("Usage Diag")}

lvgl:
  pages:
    - id: main_page
      layout: 4x4   # 4 rows x 4 columns; tiles place themselves via grid_cell_*
      styles: page_style
      bg_color: $bg_color
      widgets: []
