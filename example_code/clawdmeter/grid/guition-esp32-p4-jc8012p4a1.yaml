# esphome-modular-lvgl-buttons/example_code/clawdmeter/grid/guition-esp32-p4-jc8012p4a1.yaml
#
# PORTRAIT variant of guition-esp32-p4-jc4880p443-clawdmeter-grid.yaml — the same
# Clawdmeter assembled from INDIVIDUAL grid tiles, but with the panel turned 90°
# so it stands upright (480x800 portrait) and the creature sits ON TOP with the
# stats panel below it (instead of side-by-side in landscape).
#
#   ui/clawdmeter/engine.yaml      shared engine base — include EXACTLY ONCE
#   ui/clawdmeter/creature.yaml    the animated creature canvas
#   ui/clawdmeter/usage_rate.yaml        on-device burn rate (from raw usage %)
#   ui/clawdmeter/time_to_100.yaml       on-device "time to 100%" (+ ETA clock)
#   ui/clawdmeter/session_reset_clock.yaml on-device reset wall-clock + "reset in"
#   ui/clawdmeter/stats_panel.yaml       on-display bars panel (session/weekly/
#                                        extra/time-to-100 + burn line)
#   ui/clawdmeter/anim_select.yaml       animation picker (HA select, backend-only)
#
# Burn rate (5m + 30m), time-to-100%, the reset clock times and the animation
# picker are COMPUTED on the ESP from the raw HA inputs (session/week/extra
# usage + the reset-time timestamps). The burn rates, time-to-100% and reset
# clocks are also exposed as BACKEND device entities (ESPHome dashboard / HA);
# stats_panel.yaml renders them ON the display, reading them by id.
#
# Tested target: Guition ESP32-P4 JC8012P4A1 (portrait panel, rotation 0). The
# page is a 4-row x 4-column grid: the creature fills the top half (rows 0-1),
# the stats panel fills the bottom half (rows 2-3). If the image is upside down
# for how your panel is mounted, set rotation "180".

substitutions:
  # ---- ha-clawdmeter integration: ONE HA device per Claude account --------
  #  All entities of that device share the same slug ${ha_account}. Set it ONCE
  #  here and every binding below follows; to track a different account you
  #  normally change ONLY this line. ha_account = the entity_id stem WITHOUT the
  #  "sensor." domain and WITHOUT the per-entity suffix. Real format:
  #  claude_<name>_<plan>  (e.g. claude_jane_pro, claude_stefan_max). Find yours
  #  in HA -> Developer Tools -> States: filter "sensor.claude", take the common
  #  prefix before "_session_usage". Entity_ids derive from each sensor's NAME,
  #  so a few suffixes are NOT obvious: "Weekly usage" -> weekly_usage, "Extra
  #  usage credits" -> extra_usage_credits, resets are session_reset / weekly_reset
  #  (no _time). Override a single line below only if HA deduped that entity (_2).
  ha_account: "claude_yourname_yourplan"   # <<< PLACEHOLDER - replace before flashing

  ha_session_usage: "sensor.${ha_account}_session_usage"        # session limit used, %
  ha_week_usage:    "sensor.${ha_account}_weekly_usage"         # weekly limit used, %
  ha_extra_usage:   "sensor.${ha_account}_extra_usage"          # extra usage, % (may be disabled in HA)
  ha_extra_credits: "sensor.${ha_account}_extra_usage_credits"  # extra usage, credits
  ha_session_reset: "sensor.${ha_account}_session_reset"        # session reset, timestamp
  ha_weekly_reset:  "sensor.${ha_account}_weekly_reset"         # weekly reset, timestamp

  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

esphome:
  name: "clawdmeter-jc8012-grid"
  friendly_name: "Clawdmeter JC8012 Grid"
  comment: "Clawdmeter individual grid tiles on Guition ESP32-P4 JC8012P4A1 (portrait)"

logger:
  level: debug
  logs:
    lvgl: info
  hardware_uart: UART0

image:
  defaults:
    byte_order: little_endian

script:
  - id: time_update
    then:
      - lambda: '// no-op'

packages:
  wifi:    !include esphome-modular-lvgl-buttons/common/wifi.yaml
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  sensors: !include esphome-modular-lvgl-buttons/common/sensors_base.yaml
  theme:   !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml
  hardware: !include
    file: esphome-modular-lvgl-buttons/hardware/guition-esp32-p4-jc8012p4a1.yaml
    vars:
      rotation: "0"
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  # ---- Language pack ----
  # Compile-time locale: provides every t_* substitution the ui/clawdmeter/* files
  # and the name overrides below reference. Swap to lang/de.yaml, lang/fr.yaml or
  # lang/es.yaml (or omit entirely, English is the built-in default) for another
  # language. Exactly ONE pack.
  clawd_lang: !include esphome-modular-lvgl-buttons/ui/clawdmeter/lang/en.yaml

  # ---- Clawdmeter, assembled from individual tiles ----
  # Shared engine — include ONCE. Pulls in the animation engine + sprite data and
  # runs the frame driver; every clawd_* function becomes available afterwards.
  clawd_engine: !include esphome-modular-lvgl-buttons/ui/clawdmeter/engine.yaml

  # The animated creature — TOP half of the screen (rows 0-1, full width), with a
  # dynamic margin so it doesn't kiss the edges. Drives AUTO-mode animation from
  # the session %.
  clawd_creature: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/creature.yaml
    vars:
      uid: clawd_c
      row: 0
      column: 0
      row_span: 2
      column_span: 4
      size: "88%"   # ~6% dynamic margin on every side
      # AUTO-mode animation is driven by the REAL session-usage % so the creature
      # gets livelier as the burn rate climbs (else it stays stuck in idle).
      session_pct_entity: $ha_session_usage

  # Phase 2 (render-only): the burn rates, time-to-100%/ETA and runway are NO LONGER
  # computed on the ESP - the ha-clawdmeter integration supplies them precomputed.
  # This include mirrors those integration entities back onto the exact ids the
  # stats panel / pace frame read (clawd_burn5_rate, clawd_burn30_rate,
  # clawd_ttl_time_to_100, clawd_ttl_eta_clock, clawd_rw_runway, clawd_rw_runway_ratio,
  # clawd_pf_band). Replaces the old clawd_burn5 / clawd_burn30 / clawd_ttl / clawd_rw.
  clawd_render: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/render_from_integration.yaml
    vars:
      ha_account: ${ha_account}

  # Absolute SESSION-reset wall-clock time ("HH:MM") + "reset in xx m", derived
  # on the ESP from the raw reset-time timestamp and the device timezone.
  clawd_reset: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/session_reset_clock.yaml
    vars:
      uid: clawd_reset
      source_entity: $ha_session_reset
      name: ${t_name_session_reset_time | default("Session Reset Time")}
      reset_in_name: ${t_name_session_reset_in | default("Session Reset In")}

  # Absolute WEEKLY-reset wall-clock time ("HH:MM"), same compute, fed from the
  # weekly reset-time timestamp. The "reset in" sensor it also emits is unused.
  clawd_wreset: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/session_reset_clock.yaml
    vars:
      uid: clawd_wreset
      source_entity: $ha_weekly_reset
      name: ${t_name_weekly_reset_time | default("Weekly Reset Time")}
      reset_in_name: ${t_name_weekly_reset_in | default("Weekly Reset In")}

  # Runway (verdict + pace ratio) is now supplied precomputed by the integration
  # and mirrored by clawd_render above (clawd_rw_runway, clawd_rw_runway_ratio).

  # Pace frame (Option A, OPTIONAL / default-off elsewhere) — colours a thin
  # border on the creature's OUTER TILE from the runway pace ratio
  # (clawd_rw_runway_ratio): no value -> no border, < 0.90 green, < 1.00 orange,
  # >= 1.00 red. Pure YAML (no engine change); frames the wide top tile so there
  # are black side-gaps to the square creature. Mute in place via enabled "false".
  #
  # show_from = lowest band that draws at all: "green" (default, all bands) |
  # "orange" (hide the calm green frame, warn from orange up) | "red" (only at/
  # over the limit). Orange/red additionally BREATHE (opacity pulse). The
  # HA-exposed switch "Pace Frame" (clawd_pf_pace_breathe_sw) is a whole-frame
  # visibility master: ON shows the frame (orange/red breathe, green solid),
  # OFF hides it entirely. Toggle it live from HA without a reflash.
  clawd_pace_frame: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/pace_frame.yaml
    vars:
      uid: clawd_pf
      ratio_id: clawd_pf_band
      green_max: "0.5"
      orange_max: "1.5"
      target_id: clawd_c_creature_root
      enabled: "true"
      width: "3"
      show_from: "orange"   # "green" = show all bands | "orange" = warn from orange up | "red" = only over-limit
      # debug_id: "clawd_pf_pace_debug"   # DEBUG (disabled): re-enable TOGETHER with the clawd_pace_frame_debug include below

  # DEBUG-ONLY pace-frame band forcer (DISABLED). Re-enable BOTH this include AND
  # the debug_id var above together — HA select "Pace Frame Debug" (auto/green/
  # orange/red) to watch each band + the breathing pulse on the bench without
  # waiting for real runway data. uid MUST match the clawd_pace_frame include.
  # clawd_pace_frame_debug: !include
  #   file: esphome-modular-lvgl-buttons/ui/clawdmeter/pace_frame_debug.yaml
  #   vars:
  #     uid: clawd_pf

  # Stats panel — the on-display BOTTOM half: session / weekly / extra-usage /
  # time-till-100% bars + a 5m/30m burn line. Pulls the four percentages and the
  # credits from HA, and reads every derived time value from the backend
  # packages above BY ID. Placed rows 2-3, full width, below the creature.
  clawd_stats: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/stats_panel.yaml
    vars:
      uid: clawd_stats
      row: 2
      column: 0
      row_span: 2
      column_span: 4
      side_margin: 28   # even left+right gap to the screen edges (portrait)
      show_runway: "true"   # draw the on-display runway verdict line (local display)
      session_entity: $ha_session_usage
      weekly_entity: $ha_week_usage
      extra_entity: $ha_extra_usage
      credits_entity: $ha_extra_credits
      session_clock_id: clawd_reset_reset_clock
      session_resetin_id: clawd_reset_reset_in_min
      weekly_clock_id: clawd_wreset_reset_clock
      ttl_eta_id: clawd_ttl_eta_clock
      burn5_id: clawd_burn5_rate
      burn30_id: clawd_burn30_rate

  # Animation picker — HA select + current-clip text sensor. BACKEND ONLY: it
  # exposes the picker as device entities and draws nothing on the display.
  clawd_anim: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/anim_select.yaml
    vars:
      uid: clawd_anim
      select_name: ${t_name_animation | default("Animation")}
      current_name: ${t_name_current_anim | default("Current Animation")}
      group_name: ${t_name_usage_group | default("Usage Group")}
      rate_name: ${t_name_usage_rate | default("Usage Rate")}
      diag_name: ${t_name_usage_diag | default("Usage Diag")}

lvgl:
  pages:
    - id: main_page
      layout: 4x4   # 4 rows x 4 columns; tiles place themselves via grid_cell_*
      styles: page_style
      bg_color: $bg_color
      widgets: []
