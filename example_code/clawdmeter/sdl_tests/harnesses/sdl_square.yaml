# Reusable SDL test harness — TWO-PAGE Clawdmeter for SQUARE displays.
#
# Square panels (480x480, 720x720) waste space stacking the creature over the
# stats on one page, so this layout splits them:
#   page 1 (main_page) = creature, full screen
#   page 2 (stats_page) = the usage bars + labels
# Pages are switched with common/swipe_navigation.yaml (swipe right -> next).
#
# This drives the stats_page_id var added to remote.yaml: setting it to a second
# page id moves the stats panel off the creature page. See sdl_single.yaml for
# the notes on why loading.yaml is omitted and api: / info.yaml are required.
#
# Screen size override (square only): -s screen_width N -s screen_height N

external_components:
  - source: github://pr#12312
    components: [font, image, lvgl]
    refresh: 1h

substitutions:
  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

  screen_height: '480'
  screen_width: '480'

esphome:
  name: clawdmeter-sdl
  friendly_name: Clawdmeter SDL
  on_boot:
    - priority: -200
      then:
        - lvgl.page.show: main_page

logger:
  level: info

api:

script:
  - id: time_update
    then:
      - lambda: '// no-op'

packages:
  sensors:  !include esphome-modular-lvgl-buttons/common/sensors_base_sdl.yaml
  time:     !include esphome-modular-lvgl-buttons/common/time_homeassistant.yaml
  theme:    !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  hardware: !include esphome-modular-lvgl-buttons/hardware/SDL-lvgl.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  clawdmeter: !include
    file: esphome-modular-lvgl-buttons/ui/clawdmeter/remote.yaml
    vars:
      uid: clawd
      stats_page_id: stats_page
      # On a dedicated page the creature can fill the screen; the stats panel
      # gets the whole second page too and is centred vertically.
      clawd_margin_top: "4%"
      clawd_creature_h: "92%"
      clawd_stats_h: "92%"
      clawd_stats_align: CENTER

lvgl:
  pages:
    - id: main_page
      styles: page_style
      bg_color: $bg_color
      widgets: []
      <<: !include esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
    - id: stats_page
      styles: page_style
      bg_color: $bg_color
      widgets: []
      <<: !include esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
