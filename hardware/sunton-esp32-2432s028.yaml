# sunton-esp32-2432s028
#
# Hardware configuration file
---
substitutions:
  # Screen Size
  screen_height: 320
  screen_width: 240

esphome:
  min_version: 2026.5.0
  project:
    name: "Sunton.ESP32-2432s028"
    version: "1.0"

esp32:
  variant: esp32
  flash_size: 4MB
  framework:
    type: esp-idf

preferences:
  flash_write_interval: 5min

lvgl:
  rotation: ${rotation | default("0")}
  buffer_size: 75%

i2c:
  - sda: 27
    scl: 22

# sensor:
#   - platform: adc
#     pin: 34
#     name: "Brightness"
#     update_interval: 60s

# -------------------------------------------
# Backlight
# -------------------------------------------
output:
  - platform: ledc
    pin: 21
    id: gpio_backlight_pwm
  - id: output_red
    platform: ledc
    pin: 4
    inverted: true
  - id: output_green
    platform: ledc
    pin: 16
    inverted: true
  - id: output_blue
    platform: ledc
    pin: 17
    inverted: true

light:
  - platform: monochromatic  # Define a monochromatic, dimmable light for the backlight
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: ALWAYS_ON

  - platform: rgb
    id: rgb_led
    name: RGB LED
    red: output_red
    green: output_green
    blue: output_blue
    restore_mode: ALWAYS_ON

spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin:
      number: 12
      ignore_strapping_warning: true
  - id: touch
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

touchscreen:
  - id: my_touchscreen
    platform: xpt2046
    spi_id: touch
    cs_pin: 33
    interrupt_pin: 36
    threshold: 400
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860

display:
  - id: my_display
    platform: mipi_spi
    model: ILI9341
    color_depth: 8
    spi_id: tft
    cs_pin:
      number: 15
      ignore_strapping_warning: true
    dc_pin:
      number: 2
      ignore_strapping_warning: true
    update_interval: never
    auto_clear_enabled: false
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false
    # 320x240 landscape with swap_xy. ILI9341 model is natively 240x320, so the
    # validator computes native_width from the model default (240) and rejects an
    # explicit width:320 as "Invalid offsets". pad_width/pad_height:0 force native
    # to be derived from THIS config's own width/height, preserving the exact
    # original 320x240 + swap behavior. (mipi/__init__.py get_dimensions)
    dimensions:
      width: 320
      height: 240
      pad_width: 0
      pad_height: 0
